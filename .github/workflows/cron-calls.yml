name: Scheduled Lina calls

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger Lina scheduled calls
        run: |
          curl --fail --show-error --silent \
            --request GET \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://lina-telnyx-memory.vercel.app/api/cron-calls"
